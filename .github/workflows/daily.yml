name: Daily Stock Forecast

on:
  schedule:
    # Runs at 23:30 UTC, Mon-Fri (after US markets close).
    # Adjust the cron time/days if you want a different schedule.
    - cron: "30 23 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction script
        run: python predict.py

      - name: Commit updated predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/
          git diff --staged --quiet || git commit -m "Daily forecast update: $(date -u +'%Y-%m-%d')"
          git push
